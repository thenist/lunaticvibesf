name: cool-workflow
on: [push, workflow_dispatch]

jobs:
  prepare-vcpkg:
    name: Build dependencies (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            preset: linux-vcpkg
          - os: windows-2022
            preset: windows-vcpkg
    steps:
      # >>>> COPY PASTE
      - name: Install apt dependencies
        # libltdl-dev - libxcrypt https://github.com/microsoft/vcpkg/issues/40065
        # nasm - ffmpeg build
        run: sudo apt-get install libltdl-dev nasm
        if: startsWith(matrix.os, 'ubuntu')

      - name: Install Python dependencies
        # ninja - our build system
        run: pip install ninja
        if: startsWith(matrix.os, 'ubuntu')

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Treeless, *partial* (not *shallow*) clone, to fetch tags.
          # https://github.com/actions/checkout/issues/1471
          fetch-depth: 0
          filter: tree:0

      - uses: ilammy/msvc-dev-cmd@v1
        if: startsWith(matrix.os, 'windows')

      - uses: lukka/get-cmake@v3.29.2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "vcpkg.json" # Only look for 'vcpkg.json' in the repo root.
      # <<<< COPY PASTE

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -B ./build

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare-vcpkg
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu (GCC, Debug)"
            os: ubuntu-24.04
            preset: linux-vcpkg-gcc
            build-args: "--config Debug"
            test-args: "-C Debug"
          - name: "Ubuntu (GCC, Release)"
            os: ubuntu-24.04
            preset: linux-vcpkg-gcc
            build-args: "--config RelWithDebInfo"
            test-args: "-C RelWithDebInfo"
          - name: "Ubuntu (Clang, Debug)"
            os: ubuntu-24.04
            preset: linux-vcpkg-clang
            build-args: "--config Debug"
            test-args: "-C Debug"
          - name: "Ubuntu (Clang, Release)"
            os: ubuntu-24.04
            preset: linux-vcpkg-clang
            build-args: "--config RelWithDebInfo"
            test-args: "-C RelWithDebInfo"
          - name: "Windows (MSVC, Debug)"
            os: windows-2022
            preset: windows-vcpkg-debug
            test-args: ""
          - name: "Windows (MSVC, Release)"
            os: windows-2022
            preset: windows-vcpkg-release
            test-args: ""
            package-name: "release-build"
    steps:
      # >>>> COPY PASTE
      - name: Install apt dependencies
        # libltdl-dev - libxcrypt https://github.com/microsoft/vcpkg/issues/40065
        # nasm - ffmpeg build
        run: sudo apt-get install libltdl-dev nasm
        if: startsWith(matrix.os, 'ubuntu')

      - name: Install Python dependencies
        # ninja - our build system
        run: pip install ninja
        if: startsWith(matrix.os, 'ubuntu')

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Treeless, *partial* (not *shallow*) clone, to fetch tags.
          # https://github.com/actions/checkout/issues/1471
          fetch-depth: 0
          filter: tree:0

      - uses: ilammy/msvc-dev-cmd@v1
        if: startsWith(matrix.os, 'windows')

      - uses: lukka/get-cmake@v3.29.2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "vcpkg.json" # Only look for 'vcpkg.json' in the repo root.
      # <<<< COPY PASTE

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -B ./build

      - name: Build
        run: cmake --build build ${{ matrix.build-args }}

      - name: Run tests
        run: ctest --test-dir build ${{ matrix.test-args }} -j 4 --output-on-failure --timeout 10 --no-tests=error
        env:
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

      - name: Package
        run: cpack -G ZIP --config build/CPackConfig.cmake -B build/my_packages
        if: ${{ matrix.package-name != '' }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package-name }}
          path: build/my_packages/*.zip
        if: ${{ matrix.package-name != '' }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    name: "Release"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: ls -R artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
